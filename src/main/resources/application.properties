spring.application.name=mailform-backend
server.port=${PORT:8080}

# ---------------------------------------------
# Brevo (Sendinblue) SMTP configuration
# Get your SMTP login + master password from:
# Brevo Dashboard -> SMTP & API -> SMTP
# ---------------------------------------------
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_SMTP_USERNAME}
spring.mail.password=${BREVO_SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ---------------------------------------------
# App-specific mail settings
# ---------------------------------------------
# The "from" address must be a sender verified in your Brevo account
app.mail.from=${APP_MAIL_FROM}
# Where form submission notifications should be delivered
app.mail.company-inbox=${APP_MAIL_COMPANY_INBOX}
